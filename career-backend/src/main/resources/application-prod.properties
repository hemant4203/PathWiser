# ======================
# DATABASE (PRODUCTION)
# ======================
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/ORCLPDB
spring.datasource.username=career_user
spring.datasource.password=career123
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ======================
# HIBERNATE (PROD)
# ======================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.open-in-view=false

# ======================
# CONNECTION POOL
# ======================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# ======================
# LOGGING (PROD)
# ======================
logging.level.root=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO

# ======================
# JWT CONFIG
# ======================
jwt.secret=${JWT_SECRET}
jwt.access-expiration-ms=900000
jwt.refresh-expiration-ms=604800000

# ======================
# RATE LIMITING
# ======================
security.rate-limit.login.max-requests=5
security.rate-limit.login.window-seconds=60

security.rate-limit.refresh.max-requests=10
security.rate-limit.refresh.window-seconds=60