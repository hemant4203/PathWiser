# ======================
# DATABASE (PRODUCTION)
# ======================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ======================
# HIBERNATE (PROD)
# ======================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ======================
# CONNECTION POOL
# ======================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# ======================
# LOGGING (PROD)
# ======================
logging.level.root=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO

# ======================
# JWT CONFIG
# ======================
jwt.secret=${JWT_SECRET}
jwt.access-expiration-ms=900000
jwt.refresh-expiration-ms=604800000

# ======================
# RATE LIMITING
# ======================
security.rate-limit.login.max-requests=5
security.rate-limit.login.window-seconds=60

security.rate-limit.refresh.max-requests=10
security.rate-limit.refresh.window-seconds=60